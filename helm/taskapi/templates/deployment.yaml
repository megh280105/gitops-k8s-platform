apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "taskapi.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "taskapi.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "taskapi.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "taskapi.labels" . | nindent 8 }}
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox
          command:
            - sh
            - -c
            - until nc -z {{ include "taskapi.postgresHost" . }} 5432; do echo "waiting for postgres..."; sleep 2; done
      containers:
        - name: taskapi
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: DATABASE_URL
              value: {{ include "taskapi.databaseURL" . | quote }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
