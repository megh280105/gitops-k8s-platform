name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'helm/**'   # prevents infinite loop when CI commits updated values.yaml

permissions:
  contents: write   # commit values.yaml back to repo
  packages: write   # push image to ghcr.io

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: app/go.sum

      - name: Run tests
        run: go test ./...
        working-directory: app

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        run: |
          docker build \
            -t ghcr.io/megh280105/gitops-k8s-platform:${{ github.sha }} \
            -t ghcr.io/megh280105/gitops-k8s-platform:latest \
            app/
          docker push ghcr.io/megh280105/gitops-k8s-platform:${{ github.sha }}
          docker push ghcr.io/megh280105/gitops-k8s-platform:latest

      - name: Update Helm values with new image tag
        run: |
          sed -i "s|tag:.*|tag: \"${{ github.sha }}\"|" helm/taskapi/values.yaml

      - name: Commit and push updated values.yaml
        run: |
          git config user.name "Megh Patel"
          git config user.email "mpate164@asu.edu"
          git add helm/taskapi/values.yaml
          git diff --staged --quiet || git commit -m "chore: update image tag to ${{ github.sha }} [skip ci]"
          git push
