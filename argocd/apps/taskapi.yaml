apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: taskapi
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/megh280105/gitops-k8s-platform
    targetRevision: HEAD
    path: helm/taskapi
  destination:
    server: https://kubernetes.default.svc
    namespace: taskapi
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
